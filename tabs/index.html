<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tab Component - Belajar JavaScript</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <div class="tab-buttons">
      <button id="btn-1" class="tab-btn active">First Tab</button>
      <button id="btn-2" class="tab-btn">Second Tab</button>
      <button id="btn-3" class="tab-btn">Third Tab</button>
      <button id="btn-4" class="tab-btn">Fourth Tab</button>
    </div>

    <div class="tab-contents">
      <div class="tab-content active" id="tab-content-1">
        <p>First Tab content to be displayed here.</p>
      </div>
      <div class="tab-content" id="tab-content-2">
        <p>Second Tab content to be displayed here.</p>
      </div>
      <div class="tab-content" id="tab-content-3">
        <p>Third Tab content to be displayed here.</p>
      </div>
      <div class="tab-content" id="tab-content-4">
        <p>Fourth Tab content to be displayed here.</p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
